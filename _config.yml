# Site Ayarları
title: Mustafa Çelik
description: "Deneyimli Satış Profesyoneli & Teknoloji Tutkunu. Projelerim, Python tabanlı uygulamalarım ve hayata dair notlarım."
url: "https://mustafaceliktr.github.io"
baseurl: ""

# Tema Ayarları (Minimal Mistakes)
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "air" # "air", "aqua" veya "dark" da yapabilirsin

# Yazar Bilgileri
  avatar: "/profile.png"
  name: "Mustafa Çelik"
  bio: "Satış Yönetimi | Python Geliştirici | Vibe Coding"
  location: "İstanbul, Türkiye"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/mustafacelik84" # Burayı kendi linkinle güncelle
    
# Eklentiler
plugins:
  - jekyll-remote-theme
  - jekyll-include-cache

# Yazılar ve Sayfalar
defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
