title: "mustafaceliktr"
# Logo root dizininde olduğu için yolunu bu şekilde düzeltiyoruz:
logo: "/Mustafa.png" 
remote_theme: "mmistakes/minimal-mistakes@4.24.0"
minimal_mistakes_skin: "default"

author:
  name: "Mustafa Çelik"
  avatar: "/profile.jpg"
  bio: "Satış Yönetimi | AI Meraklısı | Vibe Coding"
  location: "İstanbul, Türkiye"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://www.linkedin.com/in/mustafacelik84"

# TÜM SAYFALARI GÖRSELDEKİ STANDARTTA EŞİTLEME
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true
      # Tüm sayfalara o kurumsal banner alanını ekler:
      header:
        overlay_color: "#2c3e50"
        overlay_filter: "0.5"

plugins:
  - jekyll-remote-theme
  - jekyll-include-cache
