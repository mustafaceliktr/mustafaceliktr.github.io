# Tema Ayarları
remote_theme: "mmistakes/minimal-mistakes"
minimal_mistakes_skin: "default"

# Plugins (Eklentiler)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme

# Site Ayarları
title: "Mustafa Çelik"
description: "Mustafa Çelik - Kişisel Portfolyo ve Özgeçmiş"
url: "https://mustafaceliktr.github.io"
locale: "tr-TR"
logo: "assets/images/mustafacleiklogo.png"
teaser: "assets/images/mustafacleiklogo.png"
og_image: "assets/images/mustafacleiklogo.png"
excerpt_separator: ""

# Dosya yollarını temiz tutmak için
include:
  - _pages

# Yazar Bilgileri
author:
  name: "Mustafa Çelik"
  avatar: "assets/images/mustafacelik.png"
  bio: "Satış Profesyoneli <br> AI & Vibe Coding Meraklısı"
  location: "İstanbul, Türkiye"
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/mustafaceliktr"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/mustafaceliktr"

footer:
  links:
    - label: "LinkedIn"
      icon: "fab fa-fw fa-linkedin"
      url: "https://linkedin.com/in/mustafaceliktr"
  copyright: "© 2026 Mustafa Çelik. Tüm hakları saklıdır."

# Varsayılanlar
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true
      share: true
      related: true
