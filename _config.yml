# Tema Ayarları
remote_theme: "mmistakes/minimal-mistakes" # Versiyon takısı olmadan en sağlıklısıdır
minimal_mistakes_skin: "default"

# Plugins (Eklentiler)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache
  - jekyll-remote-theme # Bu satırın olduğundan emin ol!
  
# Site Ayarları
title: "Mustafa Çelik"
logo: "/assets/images/Mustafa.png" # Logonun bu yolda olduğunu teyit et
teaser: "/assets/images/Mustafa.png"

# Masthead (Üst Bilgi) Ayarları
minimal_mistakes_skin: "default" # Kendi özel CSS'imizi kullanacağız

# Varsayılanlar
defaults:
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "single"
      author_profile: true
      share: true
      related: true

# Dosya yollarını temiz tutmak için
include:
  - _pages
